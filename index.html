<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘亦菲写真集 - 神仙姐姐</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            color: #333;
        }

        /* 头部样式 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header h1 {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header p {
            font-size: 1.2em;
            color: #7f8c8d;
            font-style: italic;
        }

        /* 主要内容区域 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 轮播图区域 */
        .slideshow-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .slideshow-container {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .slide {
            display: none;
            width: 100%;
            height: 500px;
            object-fit: cover;
            object-position: center 30%;
            transition: opacity 0.5s ease-in-out;
        }

        .slide.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 15px;
            cursor: pointer;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .prev:hover, .next:hover {
            background: white;
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .prev {
            left: 15px;
        }

        .next {
            right: 15px;
        }

        .dots-container {
            text-align: center;
            margin-top: 20px;
        }

        .dot {
            height: 12px;
            width: 12px;
            margin: 0 5px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: #e74c3c;
            transform: scale(1.2);
        }

        .dot:hover {
            background-color: #e74c3c;
        }

        /* 画廊区域 */
        .gallery-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .gallery-title {
            text-align: center;
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            object-position: center 30%;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .overlay {
            transform: translateY(0);
        }

        .overlay h3 {
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        .overlay p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 700px;
            max-height: 80vh;
            object-fit: contain;
            object-position: center 30%;
            border-radius: 10px;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            z-index: 2001;
        }

        .close:hover {
            color: #ff6b6b;
            transform: scale(1.1);
        }

        /* 页脚 */
        .footer {
            background: rgba(255, 255, 255, 0.95);
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            box-shadow: 0 -2px 20px rgba(0,0,0,0.1);
        }

        .footer p {
            color: #7f8c8d;
            font-size: 1em;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .slideshow-container {
                height: 300px;
            }
            
            .slide {
                height: 300px;
            }
            
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                width: 95%;
                margin: 20px auto;
            }
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <h1>✨ 刘亦菲写真集 ✨</h1>
        <p>神仙姐姐 · 优雅如诗 · 美若天仙</p>
    </header>

    <!-- 主要内容 -->
    <div class="container">
        <!-- 轮播图 -->
        <section class="slideshow-section">
            <div class="slideshow-container">
                <img class="slide active" src="563ff6aa4fb0774b3f347ab866f412da.png" alt="刘亦菲写真1">
                <img class="slide" src="95e04729a461fd0b4ebdd73c47af20b3.png" alt="刘亦菲写真2">
                <img class="slide" src="b51e374335be5e4e7f1db519e4f02f78.jpeg" alt="刘亦菲写真3">
                <img class="slide" src="43d15f5f4d12622f3eebc22913356942.jpeg" alt="刘亦菲写真4">
                <img class="slide" src="5089f174c64c48a59083510bac0431e3.jpeg" alt="刘亦菲写真5">
                <img class="slide" src="9242c7efe2dfa3d9be29206d061bebd4.jpg" alt="刘亦菲写真6">
                <img class="slide" src="ca8d38f963698fec03ec09f31c98802d.jpeg" alt="刘亦菲写真7">
                
                <button class="prev" onclick="changeSlide(-1)">❮</button>
                <button class="next" onclick="changeSlide(1)">❯</button>
            </div>
            
            <div class="dots-container">
                <span class="dot active" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
                <span class="dot" onclick="currentSlide(3)"></span>
                <span class="dot" onclick="currentSlide(4)"></span>
                <span class="dot" onclick="currentSlide(5)"></span>
                <span class="dot" onclick="currentSlide(6)"></span>
                <span class="dot" onclick="currentSlide(7)"></span>
            </div>
        </section>

        <!-- 画廊 -->
        <section class="gallery-section">
            <h2 class="gallery-title">📸 精选写真</h2>
            
            <div class="gallery-grid">
                <div class="gallery-item" onclick="openModal(this)">
                    <img src="563ff6aa4fb0774b3f347ab866f412da.png" alt="写真1">
                    <div class="overlay">
                        <h3>优雅气质</h3>
                        <p>清新脱俗的美丽</p>
                    </div>
                </div>

                <div class="gallery-item" onclick="openModal(this)">
                    <img src="95e04729a461fd0b4ebdd73c47af20b3.png" alt="写真2">
                    <div class="overlay">
                        <h3>古典韵味</h3>
                        <p>如诗如画的意境</p>
                    </div>
                </div>

                <div class="gallery-item" onclick="openModal(this)">
                    <img src="b51e374335be5e4e7f1db519e4f02f78.jpeg" alt="写真3">
                    <div class="overlay">
                        <h3>现代时尚</h3>
                        <p>时尚与优雅的完美结合</p>
                    </div>
                </div>

                <div class="gallery-item" onclick="openModal(this)">
                    <img src="43d15f5f4d12622f3eebc22913356942.jpeg" alt="写真4">
                    <div class="overlay">
                        <h3>自然清新</h3>
                        <p>自然光下的真实美丽</p>
                    </div>
                </div>

                <div class="gallery-item" onclick="openModal(this)">
                    <img src="5089f174c64c48a59083510bac0431e3.jpeg" alt="写真5">
                    <div class="overlay">
                        <h3>艺术写真</h3>
                        <p>艺术与美的完美融合</p>
                    </div>
                </div>

                <div class="gallery-item" onclick="openModal(this)">
                    <img src="9242c7efe2dfa3d9be29206d061bebd4.jpg" alt="写真6">
                    <div class="overlay">
                        <h3>影视造型</h3>
                        <p>经典角色的美丽瞬间</p>
                    </div>
                </div>

                <div class="gallery-item" onclick="openModal(this)">
                    <img src="ca8d38f963698fec03ec09f31c98802d.jpeg" alt="写真7">
                    <div class="overlay">
                        <h3>魅力绽放</h3>
                        <p>独特的个人魅力</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 模态框 -->
    <div id="myModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="img01">
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>💕 仅供欣赏和学习使用 💕</p>
        <p>刘亦菲粉丝制作 · 2024</p>
    </footer>

    <script>
        // 轮播图功能
        let slideIndex = 1;
        let slideInterval;
        const totalSlides = 7; // 更新为7张图片

        function showSlide(n) {
            const slides = document.getElementsByClassName("slide");
            const dots = document.getElementsByClassName("dot");

            if (n > slides.length) slideIndex = 1;
            if (n < 1) slideIndex = slides.length;
            
            // 隐藏所有幻灯片
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove('active');
            }
            
            // 移除所有圆点的活动状态
            for (let i = 0; i < dots.length; i++) {
                dots[i].classList.remove('active');
            }
            
            // 显示当前幻灯片
            slides[slideIndex - 1].classList.add('active');
            dots[slideIndex - 1].classList.add('active');
        }

        function changeSlide(n) {
            showSlide(slideIndex += n);
            resetAutoSlide();
        }

        function currentSlide(n) {
            showSlide(slideIndex = n);
            resetAutoSlide();
        }

        function autoSlide() {
            slideInterval = setInterval(() => {
                changeSlide(1);
            }, 5000); // 增加到5秒，让7张图片有更好的展示效果
        }

        function resetAutoSlide() {
            clearInterval(slideInterval);
            autoSlide();
        }

        // 模态框功能
        function openModal(element) {
            const modal = document.getElementById("myModal");
            const modalImg = document.getElementById("img01");
            
            modal.style.display = "block";
            modalImg.src = element.querySelector('img').src;
        }

        function closeModal() {
            document.getElementById("myModal").style.display = "none";
        }

        // 点击模态框外部关闭
        document.getElementById("myModal").addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
            if (e.key === 'ArrowLeft') {
                changeSlide(-1);
            }
            if (e.key === 'ArrowRight') {
                changeSlide(1);
            }
        });

        // 人脸检测相关变量
        let modelsLoaded = false;

        // 加载人脸检测模型
        async function loadFaceDetectionModels() {
            try {
                console.log('正在加载人脸检测模型...');

                // 使用CDN加载模型
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';

                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);

                modelsLoaded = true;
                console.log('人脸检测模型加载完成！');

                // 模型加载完成后，检测所有图片
                await detectAllFaces();

            } catch (error) {
                console.error('加载人脸检测模型失败:', error);
                console.log('将使用默认的图片显示方式');
            }
        }

        // 检测单张图片中的人脸
        async function detectFaceInImage(imgElement) {
            if (!modelsLoaded) return null;

            try {
                const detections = await faceapi.detectAllFaces(
                    imgElement,
                    new faceapi.TinyFaceDetectorOptions()
                ).withFaceLandmarks();

                if (detections.length > 0) {
                    // 获取第一个人脸的位置信息
                    const face = detections[0];
                    const box = face.detection.box;
                    const landmarks = face.landmarks;

                    // 计算脸部中心点
                    const faceCenterX = box.x + box.width / 2;
                    const faceCenterY = box.y + box.height / 2;

                    // 计算相对于图片的百分比位置
                    const imgWidth = imgElement.naturalWidth;
                    const imgHeight = imgElement.naturalHeight;

                    const percentX = (faceCenterX / imgWidth) * 100;
                    const percentY = (faceCenterY / imgHeight) * 100;

                    console.log(`检测到人脸 - X: ${percentX.toFixed(1)}%, Y: ${percentY.toFixed(1)}%`);

                    return { x: percentX, y: percentY };
                }

                return null;
            } catch (error) {
                console.error('人脸检测失败:', error);
                return null;
            }
        }

        // 调整图片显示位置以居中人脸
        function adjustImagePosition(imgElement, facePosition) {
            if (facePosition) {
                // 调整object-position，让脸部居中显示
                const adjustedY = Math.max(10, Math.min(90, facePosition.y));
                imgElement.style.objectPosition = `${facePosition.x}% ${adjustedY}%`;

                console.log(`调整图片位置到: ${facePosition.x}% ${adjustedY}%`);
            }
        }

        // 检测所有图片中的人脸
        async function detectAllFaces() {
            if (!modelsLoaded) return;

            console.log('开始检测所有图片中的人脸...');

            // 检测轮播图中的图片
            const slides = document.querySelectorAll('.slide');
            for (let i = 0; i < slides.length; i++) {
                const slide = slides[i];
                if (slide.complete && slide.naturalHeight !== 0) {
                    console.log(`检测轮播图 ${i + 1}...`);
                    const facePos = await detectFaceInImage(slide);
                    if (facePos) {
                        adjustImagePosition(slide, facePos);
                    }
                }
            }

            // 检测画廊中的图片
            const galleryImages = document.querySelectorAll('.gallery-item img');
            for (let i = 0; i < galleryImages.length; i++) {
                const img = galleryImages[i];
                if (img.complete && img.naturalHeight !== 0) {
                    console.log(`检测画廊图片 ${i + 1}...`);
                    const facePos = await detectFaceInImage(img);
                    if (facePos) {
                        adjustImagePosition(img, facePos);
                    }
                }
            }

            console.log('所有人脸检测完成！');
        }

        // 图片加载完成后检测人脸
        function setupImageLoadListeners() {
            const allImages = document.querySelectorAll('.slide, .gallery-item img');

            allImages.forEach((img, index) => {
                img.addEventListener('load', async () => {
                    if (modelsLoaded) {
                        console.log(`图片 ${index + 1} 加载完成，开始检测人脸...`);
                        const facePos = await detectFaceInImage(img);
                        if (facePos) {
                            adjustImagePosition(img, facePos);
                        }
                    }
                });
            });
        }

        // 初始化自动轮播
        autoSlide();

        // 页面加载完成后初始化
        window.addEventListener('load', async () => {
            showSlide(1);

            // 设置图片加载监听器
            setupImageLoadListeners();

            // 加载人脸检测模型
            await loadFaceDetectionModels();
        });
    </script>
</body>
</html>
