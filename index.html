            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            min-height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            color: #4caf50;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            font-size: 1.2em;
            color: #558b2f;
            font-weight: 400;
        }

        .gallery-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(76, 175, 80, 0.15);
            overflow: hidden;
            animation: fadeInUp 1s ease-out;
            backdrop-filter: blur(10px);
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pet-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .pet-image:hover {
            transform: scale(1.02);
        }

        .pet-image.clicked {
            animation: bounce 0.6s ease;
        }

        .pet-image.clicked-no-slide {
            animation: bounce 0.6s ease;
        }

        .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(76, 175, 80, 0.85));
            color: white;
            padding: 40px 30px 30px;
            text-align: center;
            font-size: 1.3em;
            font-weight: 500;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .caption.show {
            opacity: 1;
            transform: translateY(0);
        }

        .nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.95);
            border: 2px solid #4caf50;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.2);
            transition: all 0.3s ease;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4caf50;
        }

        .nav-button:hover {
            background: #4caf50;
            color: white;
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .nav-button:active {
            transform: translateY(-50%) scale(0.95);
        }

        .prev-button {
            left: 20px;
        }

        .next-button {
            right: 20px;
        }

        .counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #558b2f;
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.15);
            border: 1px solid #4caf50;
        }

        .pet-type {
            position: absolute;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
        }

        .heart-animation {
            position: absolute;
            font-size: 30px;
            pointer-events: none;
            animation: floatUp 1.5s ease-out forwards;
            z-index: 100;
        }

        .treat-animation {
            position: absolute;
            font-size: 28px;
            pointer-events: none;
            animation: floatUp 1.5s ease-out forwards;
            z-index: 100;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.1) rotate(-5deg);
            }
            50% {
                transform: scale(1.15) rotate(5deg);
            }
            75% {
                transform: scale(1.1) rotate(-5deg);
            }
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.5);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .slide-left {
            animation: slideInLeft 0.6s ease-out;
        }

        .slide-right {
            animation: slideInRight 0.6s ease-out;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        let currentIndex = 0;
        let isAnimating = false;

        // DOM 元素
        const petImage = document.getElementById('petImage');
        const caption = document.getElementById('caption');
        const counter = document.getElementById('counter');
        const petType = document.getElementById('petType');
        const prevButton = document.getElementById('prevButton');
        const nextButton = document.getElementById('nextButton');
        const imageWrapper = document.getElementById('imageWrapper');
        const touchLeft = document.getElementById('touchLeft');
        const touchRight = document.getElementById('touchRight');
        const galleryContainer = document.querySelector('.gallery-container');

        // 更新图片
        function updatePet(direction = 'next') {
            if (isAnimating) return;
            isAnimating = true;

            const pet = pets[currentIndex];

            // 移除旧的动画类
            petImage.classList.remove('slide-left', 'slide-right', 'fade-in');
            caption.classList.remove('show');

            // 添加新的动画类
            if (direction === 'next') {
                petImage.classList.add('slide-right');
            } else {
                petImage.classList.add('slide-left');
            }

            // 更新图片
            petImage.src = pet.image;
            petType.textContent = pet.type === 'cat' ? '🐱 猫咪' : '🐶 狗狗';
            counter.textContent = `${currentIndex + 1} / ${pets.length}`;

            // 显示文案
            setTimeout(() => {
                caption.textContent = pet.caption;
                caption.classList.add('show');
            }, 300);

            // 动画结束后重置
            setTimeout(() => {
                isAnimating = false;
            }, 600);
        }

        // 下一张
        function nextPet() {
            currentIndex = (currentIndex + 1) % pets.length;
            updatePet('next');
        }

        // 上一张
        function prevPet() {
            currentIndex = (currentIndex - 1 + pets.length) % pets.length;
            updatePet('prev');
        }

        // 创建零食动画（猫条或骨头）
        function createTreatAnimation(x, y, petType) {
            const treat = document.createElement('div');
            treat.className = 'treat-animation';
            // 猫用猫条🐟，狗用骨头🦴
            treat.textContent = petType === 'cat' ? '🐟' : '🦴';
            treat.style.left = `${x}px`;
            treat.style.top = `${y}px`;
            imageWrapper.appendChild(treat);

            setTimeout(() => {
                treat.remove();
            }, 1500);
        }

        // 图片点击事件
        petImage.addEventListener('click', (e) => {
            // 添加点击动画（不包含闪入效果）
            petImage.classList.add('clicked-no-slide');
            setTimeout(() => {
                petImage.classList.remove('clicked-no-slide');
            }, 600);

            // 创建零食动画
            const rect = petImage.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const currentPetType = pets[currentIndex].type;

            // 创建多个零食
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const offsetX = (Math.random() - 0.5) * 50;
                    const offsetY = (Math.random() - 0.5) * 50;
                    createTreatAnimation(x + offsetX, y + offsetY, currentPetType);
                }, i * 100);
            }
        });

        // 按钮事件
        prevButton.addEventListener('click', prevPet);
        nextButton.addEventListener('click', nextPet);

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevPet();
            } else if (e.key === 'ArrowRight') {
                nextPet();
            }
        });

        // 移动端触摸区域点击事件
        touchLeft.addEventListener('click', (e) => {
            e.stopPropagation();
            prevPet();
        });

        touchRight.addEventListener('click', (e) => {
            e.stopPropagation();
            nextPet();
        });

        // 触摸滑动支持（移动端）
        let touchStartX = 0;
        let touchEndX = 0;
        let isSwipe = false;

        galleryContainer.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            isSwipe = false;
        }, { passive: true });

        galleryContainer.addEventListener('touchmove', (e) => {
            isSwipe = true;
        }, { passive: true });

        galleryContainer.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            if (!isSwipe) return;

            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    nextPet();
                } else {
                    prevPet();
                }
            }
        }

        // 阻止浏览器默认的左右滑动前进后退
        galleryContainer.addEventListener('touchmove', (e) => {
            // 阻止水平滚动
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                const startX = touch.clientX;
                const currentX = touch.clientX;
                const diff = Math.abs(startX - currentX);

                if (diff > 10) {
                    e.preventDefault();
                }
            }
        }, { passive: false });

        // 初始化
        updatePet();
    </script>
